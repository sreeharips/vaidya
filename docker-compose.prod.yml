services:

  # ── Postgres ───────────────────────────────────────────────────────────────
  # For production, strongly prefer Supabase or AWS RDS instead of this container.
  # If using an external DB, remove this service and set DATABASE_URL in .env.production.
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vaidya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  10
    # Do NOT expose 5432 externally in production

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vaidya-redis
    restart: unless-stopped
    env_file: .env.production
    command: ["sh", "-c", "redis-server --requirepass $$REDIS_PASSWORD --maxmemory 256mb --maxmemory-policy allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    # Do NOT expose 6379 externally in production

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: vaidya-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      API_URL: http://backend:8000   # self-reference for internal health checks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:         ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval:     15s
      timeout:      5s
      retries:      5
      start_period: 20s
    # No ports exposed — nginx proxies to it

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL:  ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL:  ${NEXT_PUBLIC_APP_URL}
    container_name: vaidya-frontend
    restart: unless-stopped
    env_file: .env.production
    environment:
      API_URL:  http://backend:8000   # server-side fetch inside the container network
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    # No ports exposed — nginx proxies to it

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.26-alpine
    container_name: vaidya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # SSL is terminated at the AWS ALB — no 443 here.
      # If running without an ALB, add: - "443:443"
      # and mount your certs as a volume.
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
