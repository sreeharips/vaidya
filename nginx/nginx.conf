upstream frontend {
    server frontend:3000;
}

upstream backend {
    server backend:8000;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    server_name ayuretreats.com www.ayuretreats.com;

    # Let certbot renew certs without taking down nginx
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://ayuretreats.com$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ayuretreats.com www.ayuretreats.com;

    ssl_certificate     /etc/letsencrypt/live/ayuretreats.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ayuretreats.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Redirect www → non-www
    if ($host = www.ayuretreats.com) {
        return 301 https://ayuretreats.com$request_uri;
    }

    # Max upload size (for clinic photo uploads)
    client_max_body_size 20M;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Health check ────────────────────────────────────────────────────────
    location /health {
        proxy_pass       http://backend/health;
        proxy_set_header Host $host;
        access_log       off;
    }

    # ── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }

    # ── Next.js static assets (cache aggressively) ──────────────────────────
    location /_next/static/ {
        proxy_pass       http://frontend;
        proxy_set_header Host $host;
        expires          1y;
        add_header       Cache-Control "public, immutable";
        access_log       off;
    }

    # ── Everything else → Next.js ────────────────────────────────────────────
    location / {
        limit_req zone=general burst=40 nodelay;

        proxy_pass         http://frontend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
