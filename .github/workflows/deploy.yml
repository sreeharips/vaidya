      #         "text": "❌ *AyuRetreats deploy FAILED* on `${{ github.ref_name }}`\nCommit: ${{ github.sha }}\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
